name: CI/CD

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm run build

      - name: Cache dist
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: website/dist
          key: build-${{ hashFiles('**/pnpm-lock.yaml', 'website/**', 'src/**', 'scripts/**', 'vite.config.ts') }}

  lint-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore dist cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        id: dist-cache
        with:
          path: website/dist
          key: build-${{ hashFiles('**/pnpm-lock.yaml', 'website/**', 'src/**', 'scripts/**', 'vite.config.ts') }}

      - name: Build if cache miss
        if: steps.dist-cache.outputs.cache-hit != 'true'
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm run build

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run type-check

      - name: Run tests
        run: pnpm test

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore dist cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        id: dist-cache
        with:
          path: website/dist
          key: build-${{ hashFiles('**/pnpm-lock.yaml', 'website/**', 'src/**', 'scripts/**', 'vite.config.ts') }}

      - name: Build if cache miss
        if: steps.dist-cache.outputs.cache-hit != 'true'
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - name: Install Chromium for Lighthouse
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Lighthouse
        run: pnpm run lighthouse
        env:
          BASE_URL: /${{ github.event.repository.name }}/

  build-for-deploy:
    runs-on: ubuntu-latest
    needs: [build, lint-test, lighthouse]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          BASE_URL: /${{ github.event.repository.name }}/
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-for-deploy
    if: success()
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
